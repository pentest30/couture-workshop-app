name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch Xcode project to disable signing
        run: |
          cd ios
          # Remove code sign identity requirements
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer"/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = ""/g' Runner.xcodeproj/project.pbxproj
          # Add signing overrides to Release xcconfig
          echo 'CODE_SIGNING_REQUIRED=NO' >> Flutter/Release.xcconfig
          echo 'CODE_SIGNING_ALLOWED=NO' >> Flutter/Release.xcconfig
          echo 'CODE_SIGN_IDENTITY=' >> Flutter/Release.xcconfig
          echo 'EXPANDED_CODE_SIGN_IDENTITY=' >> Flutter/Release.xcconfig

      - name: Generate iOS build files
        run: flutter build ios --release --no-codesign --config-only

      - name: Build with xcodebuild
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | tail -20

      - name: Create unsigned IPA
        run: |
          mkdir -p build/ios/ipa
          cd ios/build/Runner.xcarchive/Products/Applications
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../../../../../build/ios/ipa/app-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: mobile/build/ios/ipa/app-unsigned.ipa
          retention-days: 14
